version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: events
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  rtmp:
    build:
      context: ./services/rtmp
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/events?schema=public
      RTMP_PORT: 1935
      RTMP_HTTP_PORT: 8000
      FFMPEG_PATH: /usr/bin/ffmpeg
    depends_on:
      - db
    ports:
      - "1935:1935"
      - "8000:8000"

  web:
    build:
      context: ./apps/web
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/events?schema=public
      RTMP_HOST: localhost
      RTMP_PORT: 1935
      RTMP_HTTP_PORT: 8000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      - db
      - rtmp
    ports:
      - "3000:3000"

volumes:
  db_data:
